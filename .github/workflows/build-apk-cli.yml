name: Build Android APK (CLI) & publish draft release

# 复制自 .github/workflows/build-apk.yml，并改造为：
# 1. 仅通过 workflow_dispatch 手动触发，不在 push/PR 上自动跑；
# 2. 触发时使用 CLI 形式的 inputs(可手填 gradle task、release 标题、是否 draft 等)；
# 3. 构建完成后把所有 APK 拷贝到一个临时目录，
#    通过 softprops/action-gh-release@v2 自动 push 到 GitHub Release 草稿页。
# 4. Tag 和 Release 标题默认使用当天日期(Asia/Shanghai 时区) vYYYYMMDD,
#    也允许手动覆盖。

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose the compilation type (assembleDebug or assembleRelease)'
        required: true
        default: 'assemble'
        type: choice
        options:
          - assemble
          - assembleDebug
          - assembleRelease
      release_tag:
        description: 'Release tag, e.g. v20260614 (leave blank to auto-use today vYYYYMMDD, Asia/Shanghai)'
        required: false
        default: ''
        type: string
      release_title:
        description: 'Release title shown on the GitHub Release page (leave blank to reuse the tag)'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Mark this release as a pre-release?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write  # 创建 tag / 上传 release asset

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # 需要拿到全部 tags 用于计算当天打包递增计数器
          fetch-depth: 0
          fetch-tags: true

      - name: Install basic system dependency packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip protobuf-compiler python3 python3-pip wget curl

      - name: Configure JDK 21 (Zulu 21.0.9)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Configuring a Gradle 8.13 environment
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: |
          npm install -g pnpm
          pnpm --version

      - name: Verify Bun
        run: |
          which bun
          bun --version

      - name: Install web-ui dependencies with Bun
        working-directory: core/chatai/web-ui
        run: |
          bun install --frozen-lockfile

      - name: Install the specified NDK and Android SDK CMake (3.22.1)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install higher CMake version (3.31.1) via pip
        run: |
          sudo pip3 install cmake==3.31.1 --break-system-packages
          CMAKE_DATA_DIR=$(python3 -c "import cmake, os; print(os.path.join(os.path.dirname(cmake.__file__), 'data'))")
          echo "cmake.dir=$CMAKE_DATA_DIR" >> local.properties

          cmake --version
          protoc --version
          python3 --version

      - name: Grant execution permissions to the Gradle wrapper
        run: chmod +x ./gradlew

      # === 版本号/版本代码 / tag 计算 ==================================================
      # 计算三样东西:
      #   1) TODAY  : vYYYYMMDD(Asia/Shanghai), 用于 release tag
      #   2) COUNTER: 当天打包递增计数器, 2 位 0 填充(01, 02, ...);
      #               通过统计 `v${TODAY}-*` 的 git tag 数量 + 1 得到
      #   3) SHA7   : 当前 commit 的 7 位简写, 来自 ${{ github.sha }}
      # 注入到 gradle: -Pide.build.dailyCounter=NN -Pide.build.gitShortSha=xxxxxxx
      - name: Compute today tag, daily counter and git short SHA
        id: version
        run: |
          set -euo pipefail

          TODAY="v$(TZ=Asia/Shanghai date +%Y%m%d)"
          SHA7="${GITHUB_SHA:0:7}"

          # 统计当天已存在的 tag(vYYYYMMDD-*)
          EXISTING=$(git tag --list "${TODAY}-*" 2>/dev/null | wc -l | tr -d ' ')
          NEXT=$((EXISTING + 1))
          # 限制在 1~99, 不足 2 位前补 0
          if [ "$NEXT" -gt 99 ]; then
            echo "::error::Daily build counter overflow (>99), refusing to continue."
            exit 1
          fi
          COUNTER=$(printf "%02d" "$NEXT")

          # 最终 release tag 与 versionName 一致(vYYYYMMDD-NN-sha7),
          # 便于 release 页面与 APK 元数据一一对应.
          # 允许通过 release_tag 输入覆盖(向后兼容).
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            FINAL_TAG="${{ github.event.inputs.release_tag }}"
          else
            FINAL_TAG="${TODAY}-${COUNTER}-${SHA7}"
          fi

          {
            echo "today=${TODAY}"
            echo "counter=${COUNTER}"
            echo "sha7=${SHA7}"
            echo "tag=${FINAL_TAG}"
          } >> "$GITHUB_OUTPUT"

          echo "::group::Resolved version info"
          echo "  TODAY   = ${TODAY}"
          echo "  COUNTER = ${COUNTER}  (existing tags for ${TODAY}-*: ${EXISTING})"
          echo "  SHA7    = ${SHA7}  (from GITHUB_SHA=${GITHUB_SHA})"
          echo "  tag     = ${FINAL_TAG}"
          echo "::endgroup::"

      - name: Compile APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx5g -XX:MaxMetaspaceSize=1g' -Dorg.gradle.daemon=false"
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
        run: |
          # 注入当天打包递增计数器与 git 7 位简写, gradle 端通过
          # ProjectConfig.dailyBuildCounter / gitShortSha 读取.
          gradle ${{ github.event.inputs.build_type }} \
            -Pide.build.dailyCounter=${{ steps.version.outputs.counter }} \
            -Pide.build.gitShortSha=${{ steps.version.outputs.sha7 }} \
            --build-cache --max-workers=2

      - name: Collect built APKs into staging dir
        run: |
          mkdir -p release-assets
          # assemble / assembleRelease -> core/app/build/outputs/apk/release/*
          # assembleDebug          -> core/app/build/outputs/apk/debug/*
          for variant in release debug; do
            if [ -d "core/app/build/outputs/apk/${variant}" ]; then
              # 只搬运 *.apk; -mtime -1 防御性过滤
              find "core/app/build/outputs/apk/${variant}" -maxdepth 1 -type f -name '*.apk' -exec cp -v {} release-assets/ \;
            fi
          done
          echo "---"
          echo "Collected APKs:"
          ls -la release-assets
          if [ -z "$(ls -A release-assets 2>/dev/null)" ]; then
            echo "::error::No APK found under core/app/build/outputs/apk/. Did the build succeed?"
            exit 1
          fi

      - name: Create / update draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ github.event.inputs.release_title != '' && github.event.inputs.release_title || steps.version.outputs.tag }}
          draft: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          # 自动生成简洁的 changelog 主体,内容可后续在网页编辑
          body: |
            ### ZeroStudio nightly build

            - 构建类型：`${{ github.event.inputs.build_type }}`
            - 版本号：`${{ steps.version.outputs.tag }}`
            - 当天打包递增计数器：`${{ steps.version.outputs.counter }}`
            - Commit: `${{ steps.version.outputs.sha7 }}` (full: `${{ github.sha }}`)
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            APK 由 GitHub Actions 自动构建并上传,如有兼容性问题请附日志 / 设备信息反馈。
          files: |
            release-assets/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
