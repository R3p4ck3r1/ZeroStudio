name: Sync core/chatai from RikkaHub

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'RikkaHub git ref to import (branch/tag/sha)'
        required: true
        default: 'main'
      base_ref:
        description: 'Previous imported RikkaHub ref for 3-way merge; leave empty to do a direct update'
        required: false
        default: ''
      dry_run:
        description: 'Only show diff, do not commit'
        required: true
        type: boolean
        default: true
  schedule:
    # Poll upstream daily; GitHub cannot subscribe directly to another repo push event.
    - cron: '17 3 * * *'

concurrency:
  group: sync-chatai-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-chatai:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout ZeroStudio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve sync inputs
        id: sync-inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SOURCE_REF: ${{ github.event.inputs.source_ref }}
          INPUT_BASE_REF: ${{ github.event.inputs.base_ref }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          source_ref="${INPUT_SOURCE_REF:-main}"
          base_ref="${INPUT_BASE_REF:-}"
          if [[ -z "$base_ref" && -f core/chatai/.rikkahub-sync-ref ]]; then
            base_ref="$(cat core/chatai/.rikkahub-sync-ref)"
          fi
          dry_run="${INPUT_DRY_RUN:-true}"
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            dry_run="false"
          fi
          {
            echo "source_ref=$source_ref"
            echo "base_ref=$base_ref"
            echo "dry_run=$dry_run"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout upstream RikkaHub
        env:
          SOURCE_REF: ${{ steps.sync-inputs.outputs.source_ref }}
          BASE_REF: ${{ steps.sync-inputs.outputs.base_ref }}
        run: |
          set -euo pipefail
          rm -rf /tmp/rikkahub-src /tmp/rikkahub-base
          git clone https://github.com/rikkahub/rikkahub.git /tmp/rikkahub-src
          git -C /tmp/rikkahub-src checkout "$SOURCE_REF"
          if [[ -n "$BASE_REF" ]]; then
            git clone https://github.com/rikkahub/rikkahub.git /tmp/rikkahub-base
            git -C /tmp/rikkahub-base checkout "$BASE_REF"
          fi

      - name: Merge upstream into core/chatai
        env:
          BASE_REF: ${{ steps.sync-inputs.outputs.base_ref }}
        run: |
          set -euo pipefail
          args=(--source /tmp/rikkahub-src --target core/chatai)
          if [[ -n "$BASE_REF" ]]; then
            args+=(--base /tmp/rikkahub-base)
          fi
          # Preserve local Gradle/Kotlin script wiring; merge regular sources with
          # a three-way merge whenever base_ref is provided.
          python3 scripts/chatai/sync_from_rikkahub.py "${args[@]}" --protect '*.kts,**/*.kts'

      - name: Record upstream revision
        run: |
          set -euo pipefail
          git -C /tmp/rikkahub-src rev-parse HEAD > core/chatai/.rikkahub-sync-ref

      - name: Re-apply ZeroStudio integration patches
        run: |
          set -euo pipefail
          bash scripts/chatai/reapply-integrations.sh

      - name: Show changed files
        run: |
          git status --short
          git diff --stat

      - name: Commit changes
        if: steps.sync-inputs.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          git add core/chatai scripts/chatai .github/workflows/update-chatai.yml
          if git diff --cached --quiet; then
            echo "No changes after sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          upstream_sha=$(git -C /tmp/rikkahub-src rev-parse --short HEAD)
          git commit -m "chore(chatai): sync from rikkahub @ ${upstream_sha}"

      - name: Upload sync diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chatai-sync-diff
          path: |
            core/chatai
          if-no-files-found: warn
